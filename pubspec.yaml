name: codedevweb
version: 1.0.0+1
publish_to: none
description: A new Flutter project.
environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  firebase_auth: ^5.1.2
  firebase_dynamic_links: ^6.0.3
  file_picker: ^3.0.1
  image_picker: ^0.8.4+9
  firebase_storage: ^12.1.1
  get: 4.6.6
  flutter:
    sdk: flutter
  firebase_core: ^3.2.0
  cloud_firestore: ^5.1.0
  chat_message_timestamp: ^0.0.1
  thread: ^0.2.2
  calendar_view: ^1.4.0
  flutter_map: ^8.1.1
  url_launcher: ^6.3.1
  carousel_slider: ^5.0.0
  lottie: ^3.3.1
  visibility_detector: ^0.4.0+2
  animated_text_kit: ^4.2.2
  widget_and_text_animator: ^1.1.5

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: YearFont
      fonts:
        - asset: assets/fonts/yearfont.ttf

    - family: MothFont
      fonts:
        - asset: assets/fonts/mothfont.ttf

assets:
  - assets/images/avatar.jpg
  - assets/images/image1.jpg
  - assets/animations/comehereicon.json
  - assets/animations/notifyicon.json
  - assets/animations/hearticonincalendar.json
